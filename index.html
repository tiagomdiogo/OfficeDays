<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Tracker PT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-card { transition: all 0.2s; cursor: pointer; }
        .day-card.selected { background-color: #3b82f6; color: white; border-color: #2563eb; }
        .holiday { background-color: #fee2e2; color: #991b1b; cursor: not-allowed; opacity: 0.7; }
        .weekend { background-color: #f3f4f6; color: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <header class="mb-8 border-b pb-4">
            <h1 class="text-2xl font-bold text-gray-800">🇵🇹 Office Day Tracker</h1>
            <p id="currentMonthYear" class="text-gray-500 font-medium italic"></p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                <p class="text-sm text-blue-600 font-semibold uppercase">Goal (60%)</p>
                <p class="text-3xl font-bold text-blue-900"><span id="goalDays">0</span> days</p>
            </div>
            <div class="bg-green-50 p-4 rounded-lg border border-green-100">
                <p class="text-sm text-green-600 font-semibold uppercase">Completed</p>
                <p class="text-3xl font-bold text-green-900"><span id="doneDays">0</span> days</p>
            </div>
        </div>

        <div id="statusMessage" class="mb-6 p-3 rounded-md text-center font-medium"></div>

        <div class="grid grid-cols-7 gap-2 text-center mb-2">
            <div class="text-xs font-bold text-gray-400">MON</div>
            <div class="text-xs font-bold text-gray-400">TUE</div>
            <div class="text-xs font-bold text-gray-400">WED</div>
            <div class="text-xs font-bold text-gray-400">THU</div>
            <div class="text-xs font-bold text-gray-400">FRI</div>
            <div class="text-xs font-bold text-gray-400">SAT</div>
            <div class="text-xs font-bold text-gray-400">SUN</div>
        </div>
        <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
        
        <button onclick="resetData()" class="mt-8 text-xs text-red-400 hover:text-red-600 underline">Clear all data</button>
    </div>

    <script>
        const holidays = ["01-01", "04-25", "05-01", "06-10", "08-15", "10-05", "11-01", "12-01", "12-08", "12-25"];
        const now = new Date();
        const month = now.getMonth();
        const year = now.getFullYear();
        
        let selectedDays = JSON.parse(localStorage.getItem('officeDays') || '[]');

        function init() {
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('currentMonthYear').innerText = `${monthNames[month]} ${year}`;
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay(); // 0 (Sun) to 6 (Sat)
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Adjust for European Monday-start: Transform Sun=0 to 6, Mon=1 to 0
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            let workingDaysCount = 0;

            // Padding for start of month
            for (let i = 0; i < offset; i++) {
                grid.innerHTML += `<div></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dayOfWeek = dateObj.getDay();
                const dateStr = `${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isHoliday = holidays.includes(dateStr);
                const isSelected = selectedDays.includes(d);

                let classes = "h-12 flex items-center justify-center rounded-md border text-sm font-medium day-card ";
                let onClick = `toggleDay(${d})`;

                if (isWeekend) { classes += "weekend"; onClick = ""; }
                else if (isHoliday) { classes += "holiday"; onClick = ""; }
                else {
                    workingDaysCount++;
                    if (isSelected) classes += "selected";
                }

                grid.innerHTML += `<div onclick="${onClick}" class="${classes}">${d}</div>`;
            }

            // Calculations
            const goal = Math.ceil(workingDaysCount * 0.6);
            const done = selectedDays.length;
            const remaining = goal - done;

            document.getElementById('goalDays').innerText = goal;
            document.getElementById('doneDays').innerText = done;
            
            const statusBox = document.getElementById('statusMessage');
            if (remaining > 0) {
                statusBox.innerText = `You still need to go ${remaining} more days this month.`;
                statusBox.className = "mb-6 p-3 rounded-md text-center font-medium bg-yellow-100 text-yellow-800";
            } else {
                statusBox.innerText = "Goal reached! Enjoy your remote work! 🎉";
                statusBox.className = "mb-6 p-3 rounded-md text-center font-medium bg-green-100 text-green-800";
            }
        }

        function toggleDay(day) {
            const index = selectedDays.indexOf(day);
            if (index > -1) {
                selectedDays.splice(index, 1);
            } else {
                selectedDays.push(day);
            }
            localStorage.setItem('officeDays', JSON.stringify(selectedDays));
            renderCalendar();
        }

        function resetData() {
            if(confirm("Are you sure you want to clear your marked days?")) {
                selectedDays = [];
                localStorage.removeItem('officeDays');
                renderCalendar();
            }
        }

        init();
    </script>
</body>
</html>
