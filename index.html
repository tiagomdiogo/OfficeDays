<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-card { transition: all 0.2s; cursor: pointer; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid #e5e7eb; font-weight: 600; font-size: 0.875rem; }
        .day-card.selected { background-color: #3b82f6; color: white; border-color: #2563eb; }
        .holiday { background-color: #fee2e2; color: #991b1b; cursor: not-allowed; border-color: #fecaca; opacity: 0.8; }
        .weekend { background-color: #f3f4f6; color: #9ca3af; cursor: not-allowed; border: none; }
        .empty { visibility: hidden; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6">
        <div class="flex items-center justify-between mb-6">
            <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-full">◀</button>
            <h1 id="monthDisplay" class="text-xl font-bold text-gray-800 uppercase tracking-tight">Loading...</h1>
            <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-full">▶</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-center">
                <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mb-1">Goal (60%)</p>
                <p class="text-3xl font-black text-blue-900 leading-none"><span id="goalDays">0</span>d</p>
            </div>
            <div class="bg-green-50 p-4 rounded-2xl border border-green-100 text-center">
                <p class="text-[10px] text-green-600 font-bold uppercase tracking-widest mb-1">Done</p>
                <p class="text-3xl font-black text-green-900 leading-none"><span id="doneDays">0</span>d</p>
            </div>
        </div>

        <div class="grid grid-cols-7 gap-1 text-center mb-2">
            <template id="dayHeader"><div class="text-[10px] font-bold text-gray-400"></div></template>
            <div class="text-[10px] font-bold text-gray-400">M</div>
            <div class="text-[10px] font-bold text-gray-400">T</div>
            <div class="text-[10px] font-bold text-gray-400">W</div>
            <div class="text-[10px] font-bold text-gray-400">T</div>
            <div class="text-[10px] font-bold text-gray-400">F</div>
            <div class="text-[10px] font-bold text-gray-400">S</div>
            <div class="text-[10px] font-bold text-gray-400">S</div>
        </div>

        <div id="calendarGrid" class="grid grid-cols-7 gap-1.5 mb-6"></div>

        <div class="space-y-4 border-t pt-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Add Vacation/Holiday (DD-MM)</label>
                <div class="flex gap-2">
                    <input type="text" id="holidayInput" placeholder="e.g. 14-04" class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="addHoliday()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-black">Add</button>
                </div>
            </div>
            
            <div id="holidayTags" class="flex flex-wrap gap-2"></div>
            
            <div class="text-center">
                <button onclick="resetAll()" class="text-[11px] text-red-400 hover:text-red-600 font-medium">Clear all local history</button>
            </div>
        </div>
    </div>

    <script>
        // Use current date as starting point
        let viewDate = new Date(); 
        const baseHolidays = ["01-01", "04-25", "05-01", "06-10", "08-15", "10-05", "11-01", "12-01", "12-08", "12-25"];
        
        let customHolidays = JSON.parse(localStorage.getItem('customHolidays') || '[]');
        let selectedDays = JSON.parse(localStorage.getItem('officeTrackingData') || '{}');

        function render() {
            const m = viewDate.getMonth();
            const y = viewDate.getFullYear();
            const monthKey = `${y}-${m}`;

            const names = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('monthDisplay').innerText = `${names[m]} ${y}`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            // European style (Mon-Sun)
            const firstDayIndex = new Date(y, m, 1).getDay();
            const offset = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            let workingDaysCount = 0;
            const currentMonthSelections = selectedDays[monthKey] || [];

            for (let i = 0; i < offset; i++) {
                const empty = document.createElement('div');
                empty.className = "empty";
                grid.appendChild(empty);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(y, m, d);
                const dayOfWeek = dateObj.getDay();
                const holidayStr = `${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const customStr = `${String(d).padStart(2, '0')}-${String(m + 1).padStart(2, '0')}`;
                
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isHoliday = baseHolidays.includes(holidayStr) || customHolidays.includes(customStr);
                const isSelected = currentMonthSelections.includes(d);

                const dayEl = document.createElement('div');
                dayEl.innerText = d;
                dayEl.className = "day-card";

                if (isWeekend) {
                    dayEl.classList.add("weekend");
                } else if (isHoliday) {
                    dayEl.classList.add("holiday");
                } else {
                    workingDaysCount++;
                    if (isSelected) dayEl.classList.add("selected");
                    dayEl.onclick = () => toggleDay(d);
                }
                grid.appendChild(dayEl);
            }

            document.getElementById('goalDays').innerText = Math.ceil(workingDaysCount * 0.6);
            document.getElementById('doneDays').innerText = currentMonthSelections.length;
            renderHolidayTags();
        }

        function toggleDay(day) {
            const monthKey = `${viewDate.getFullYear()}-${viewDate.getMonth()}`;
            if (!selectedDays[monthKey]) selectedDays[monthKey] = [];
            
            const idx = selectedDays[monthKey].indexOf(day);
            if (idx > -1) selectedDays[monthKey].splice(idx, 1);
            else selectedDays[monthKey].push(day);

            localStorage.setItem('officeTrackingData', JSON.stringify(selectedDays));
            render();
        }

        function addHoliday() {
            const input = document.getElementById('holidayInput');
            const val = input.value.trim();
            if (/^\d{2}-\d{2}$/.test(val)) {
                if (!customHolidays.includes(val)) {
                    customHolidays.push(val);
                    localStorage.setItem('customHolidays', JSON.stringify(customHolidays));
                    render();
                }
                input.value = '';
            }
        }

        function removeHoliday(val) {
            customHolidays = customHolidays.filter(h => h !== val);
            localStorage.setItem('customHolidays', JSON.stringify(customHolidays));
            render();
        }

        function renderHolidayTags() {
            const container = document.getElementById('holidayTags');
            container.innerHTML = customHolidays.map(h => `
                <div class="flex items-center gap-1 bg-slate-100 text-slate-600 px-2 py-1 rounded-lg text-[10px] font-bold border border-slate-200">
                    ${h} <button onclick="removeHoliday('${h}')" class="text-slate-400 hover:text-red-500 ml-1 text-sm">×</button>
                </div>
            `).join('');
        }

        function changeMonth(step) {
            viewDate.setMonth(viewDate.getMonth() + step);
            render();
        }

        function resetAll() {
            if(confirm("This will delete all your marks and custom holidays. Proceed?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        // Run on load
        window.onload = render;
    </script>
</body>
</html>
